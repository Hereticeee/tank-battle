<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
}

.game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.game-header {
    display: flex;
    justify-content: space-between;
    width: 640px;
    color: #fff;
    font-size: 16px;
    padding: 0 10px;
}

.game-header .info-item {
    display: flex;
    align-items: center;
    gap: 8px;
}

.game-header .label {
    color: #888;
    font-size: 12px;
    text-transform: uppercase;
}

.game-header .value {
    color: #ffcc00;
    font-size: 20px;
    font-weight: bold;
}

canvas {
    border: 3px solid #333;
    background: #1a1a1a;
    image-rendering: pixelated;
}

.game-over-overlay {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.9);
    border: 2px solid #ff4444;
    padding: 40px 60px;
    text-align: center;
    z-index: 10;
    border-radius: 8px;
}

.game-over-overlay.visible {
    display: block;
}

.game-over-overlay h1 {
    color: #ff4444;
    font-size: 36px;
    margin-bottom: 20px;
}

.game-over-overlay .final-score {
    color: #ffcc00;
    font-size: 24px;
    margin-bottom: 30px;
}

.game-over-overlay button {
    background: #ff4444;
    color: #fff;
    border: none;
    padding: 12px 40px;
    font-size: 18px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    border-radius: 4px;
    transition: background 0.2s;
}

.game-over-overlay button:hover {
    background: #ff6666;
}

.controls-hint {
    color: #666;
    font-size: 12px;
    text-align: center;
    margin-top: 5px;
}

.controls-hint span.key {
    color: #999;
    background: #222;
    padding: 2px 6px;
    border: 1px solid #444;
    border-radius: 3px;
    margin: 0 2px;
}
</style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <div class="info-item">
            <span class="label">得分</span>
            <span class="value" id="score">0</span>
        </div>
        <div class="info-item">
            <span class="label">波次</span>
            <span class="value" id="wave">1</span>
        </div>
        <div class="info-item">
            <span class="label">生命</span>
            <span class="value" id="lives">3</span>
        </div>
        <div class="info-item">
            <span class="label">剩余敌人</span>
            <span class="value" id="enemies">0</span>
        </div>
    </div>
    <canvas id="gameCanvas" width="640" height="480"></canvas>
    <div class="controls-hint">
        <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> 移动 &nbsp;
        <span class="key">空格</span> 发射 &nbsp;
        <span class="key">R</span> 重新开始
    </div>
    <div class="game-over-overlay" id="gameOverOverlay">
        <h1 id="gameOverTitle">游戏结束</h1>
        <p class="final-score">最终得分: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">重新开始</button>
    </div>
</div>

<script>
// ============ 游戏主代码 ============
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 20;
const ROWS = 15;
const CELL_SIZE = 32; // 640/20 = 32, 480/15 = 32

// 方向常量
const DIR_UP = 0;
const DIR_RIGHT = 1;
const DIR_DOWN = 2;
const DIR_LEFT = 3;

// 地图元素
const EMPTY = 0;
const BRICK = 1;
const STEEL = 2;
const WATER = 3;
const BASE = 4;

// 游戏状态
let score = 0;
let wave = 1;
let lives = 3;
let enemiesRemaining = 0;
let enemiesActive = [];
let bullets = [];
let particles = [];
let player = null;
let map = [];
let gameRunning = false;
let gameOver = false;
let spawnTimer = 0;
let spawnInterval = 120; // 帧
let maxActiveEnemies = 4;
let totalEnemiesThisWave = 0;
let enemiesSpawned = 0;
let basePosition = { x: 9, y: 14 }; // 基地位置

// 键盘状态
const keys = {};
let lastShotTime = 0;
const shotCooldown = 30; // 帧

// 坦克类
class Tank {
    constructor(x, y, dir, color, isPlayer = false) {
        this.x = x;
        this.y = y;
        this.dir = dir;
        this.color = color;
        this.isPlayer = isPlayer;
        this.speed = isPlayer ? 0.014 : 0.003;
        this.size = CELL_SIZE - 4;
        this.halfSize = this.size / 2;
        this.alive = true;
        this.moveTimer = 60 + Math.random() * 40;
        this.moveDir = dir;
        this.shootTimer = 120 + Math.random() * 80;
        this.shootDelay = isPlayer ? 30 : 300 + Math.random() * 160;
        this.flashTimer = 0;
        this.cellX = Math.floor(x / CELL_SIZE);
        this.cellY = Math.floor(y / CELL_SIZE);
        this.type = 'normal'; // normal, fast, heavy
    }

    update() {
        if (!this.alive) return;

        // 出生闪烁
        if (this.flashTimer > 0) {
            this.flashTimer--;
            return;
        }

        if (!this.isPlayer) {
            this.aiUpdate();
        } else {
            this.playerUpdate();
        }

        // 射击
        this.shootTimer--;
        if (this.isPlayer) {
            if (keys[' '] && this.shootTimer <= 0) {
                this.shoot();
                this.shootTimer = shotCooldown;
            }
        } else {
            if (this.shootTimer <= 0) {
                this.shoot();
                this.shootTimer = this.shootDelay;
            }
        }
    }

    playerUpdate() {
        let dx = 0, dy = 0;
        let newDir = this.dir;

        if (keys['ArrowUp'] || keys['w'] || keys['W']) {
            dy = -1;
            newDir = DIR_UP;
        } else if (keys['ArrowDown'] || keys['s'] || keys['S']) {
            dy = 1;
            newDir = DIR_DOWN;
        } else if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
            dx = -1;
            newDir = DIR_LEFT;
        } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
            dx = 1;
            newDir = DIR_RIGHT;
        }

        if (dx !== 0 || dy !== 0) {
            this.dir = newDir;
            let nx = this.x + dx * this.speed * CELL_SIZE;
            let ny = this.y + dy * this.speed * CELL_SIZE;

            if (this.canMoveTo(nx, ny)) {
                this.x = nx;
                this.y = ny;
            } else {
                // 尝试单轴滑动
                if (dx !== 0 && this.canMoveTo(nx, this.y)) {
                    this.x = nx;
                }
                if (dy !== 0 && this.canMoveTo(this.x, ny)) {
                    this.y = ny;
                }
            }
        }
    }

    aiUpdate() {
        this.moveTimer--;

        if (this.moveTimer <= 0) {
            // AI决策 - 有概率朝向玩家
            if (player && player.alive && Math.random() < 0.35) {
                let dx = player.x - this.x;
                let dy = player.y - this.y;
                if (Math.abs(dx) > Math.abs(dy)) {
                    this.moveDir = dx > 0 ? DIR_RIGHT : DIR_LEFT;
                } else {
                    this.moveDir = dy > 0 ? DIR_DOWN : DIR_UP;
                }
            } else {
                // 优先选择前进方向，减少原地转圈
                let choices = [this.moveDir, Math.floor(Math.random() * 4), Math.floor(Math.random() * 4)];
                this.moveDir = choices[Math.floor(Math.random() * choices.length)];
            }
            this.moveTimer = 50 + Math.random() * 80;
        }

        // 偶尔改变方向（降低概率）
        if (Math.random() < 0.003) {
            this.moveDir = Math.floor(Math.random() * 4);
            this.moveTimer = 40 + Math.random() * 60;
        }

        this.dir = this.moveDir;

        let dx = 0, dy = 0;
        switch (this.dir) {
            case DIR_UP: dy = -1; break;
            case DIR_DOWN: dy = 1; break;
            case DIR_LEFT: dx = -1; break;
            case DIR_RIGHT: dx = 1; break;
        }

        let nx = this.x + dx * this.speed * CELL_SIZE;
        let ny = this.y + dy * this.speed * CELL_SIZE;

        if (this.canMoveTo(nx, ny, true)) {
            this.x = nx;
            this.y = ny;
        } else {
            // 撞墙后立即选择新方向
            this.moveDir = Math.floor(Math.random() * 4);
            this.moveTimer = 10 + Math.random() * 30;
        }
    }

    canMoveTo(nx, ny, isEnemy = false) {
        let left = nx - this.halfSize;
        let right = nx + this.halfSize;
        let top = ny - this.halfSize;
        let bottom = ny + this.halfSize;

        // 边界检查
        if (left < 0 || right > canvas.width || top < 0 || bottom > canvas.height) {
            return false;
        }

        // 地图碰撞
        let col1 = Math.floor(left / CELL_SIZE);
        let col2 = Math.floor((right - 1) / CELL_SIZE);
        let row1 = Math.floor(top / CELL_SIZE);
        let row2 = Math.floor((bottom - 1) / CELL_SIZE);

        for (let r = row1; r <= row2; r++) {
            for (let c = col1; c <= col2; c++) {
                if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
                let cell = map[r][c];
                if (cell === BRICK || cell === STEEL) return false;
                // 玩家不能穿过基地，敌人不能通过水
                if (this.isPlayer && cell === BASE && !isEnemy) return false;
                if (isEnemy && cell === WATER) return false;
                if (isEnemy && cell === BASE) return false;
            }
        }

        // 坦克碰撞检测
        let allTanks = this.isPlayer ? enemiesActive : [player, ...enemiesActive.filter(e => e !== this)];
        for (let tank of allTanks) {
            if (!tank || !tank.alive || tank === this) continue;
            let dx = nx - tank.x;
            let dy = ny - tank.y;
            let minDist = this.halfSize + tank.halfSize + 2;
            if (Math.abs(dx) < minDist && Math.abs(dy) < minDist) {
                return false;
            }
        }

        return true;
    }

    shoot() {
        let bx = this.x;
        let by = this.y;
        let speed = this.isPlayer ? 0.2 : 0.08;
        let bullet = new Bullet(bx, by, this.dir, speed, this.isPlayer);
        bullets.push(bullet);
    }

    draw(ctx) {
        if (!this.alive) return;

        // 闪烁效果
        if (this.flashTimer > 0 && Math.floor(this.flashTimer / 4) % 2 === 0) return;

        ctx.save();
        ctx.translate(this.x, this.y);

        let r = this.halfSize;

        // 坦克主体
        ctx.fillStyle = this.color;
        ctx.fillRect(-r + 2, -r + 2, this.size - 4, this.size - 4);

        // 坦克履带
        ctx.fillStyle = '#111';
        if (this.dir === DIR_UP || this.dir === DIR_DOWN) {
            ctx.fillRect(-r, -r, 6, this.size);
            ctx.fillRect(r - 6, -r, 6, this.size);
        } else {
            ctx.fillRect(-r, -r, this.size, 6);
            ctx.fillRect(-r, r - 6, this.size, 6);
        }

        // 炮塔
        ctx.fillStyle = this.isPlayer ? '#00ff88' : '#ff6644';
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.45, 0, Math.PI * 2);
        ctx.fill();

        // 炮管
        ctx.fillStyle = '#ddd';
        let barrelLen = r * 1.1;
        let barrelW = 5;
        ctx.save();
        switch (this.dir) {
            case DIR_UP:
                ctx.fillRect(-barrelW/2, -barrelLen, barrelW, barrelLen);
                break;
            case DIR_DOWN:
                ctx.fillRect(-barrelW/2, 0, barrelW, barrelLen);
                break;
            case DIR_LEFT:
                ctx.fillRect(-barrelLen, -barrelW/2, barrelLen, barrelW);
                break;
            case DIR_RIGHT:
                ctx.fillRect(0, -barrelW/2, barrelLen, barrelW);
                break;
        }
        ctx.restore();

        ctx.restore();
    }
}

// 子弹类
class Bullet {
    constructor(x, y, dir, speed, isPlayerBullet) {
        this.x = x;
        this.y = y;
        this.dir = dir;
        this.speed = speed;
        this.isPlayerBullet = isPlayerBullet;
        this.alive = true;
        this.size = 4;
    }

    update() {
        let dx = 0, dy = 0;
        switch (this.dir) {
            case DIR_UP: dy = -1; break;
            case DIR_DOWN: dy = 1; break;
            case DIR_LEFT: dx = -1; break;
            case DIR_RIGHT: dx = 1; break;
        }

        this.x += dx * this.speed * CELL_SIZE;
        this.y += dy * this.speed * CELL_SIZE;

        // 边界检查
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
            this.alive = false;
            return;
        }

        // 地图碰撞
        let col = Math.floor(this.x / CELL_SIZE);
        let row = Math.floor(this.y / CELL_SIZE);

        if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
            let cell = map[row][col];
            if (cell === BRICK) {
                map[row][col] = EMPTY;
                this.alive = false;
                spawnParticles(col * CELL_SIZE + CELL_SIZE/2, row * CELL_SIZE + CELL_SIZE/2, '#cc8844');
                return;
            } else if (cell === STEEL) {
                this.alive = false;
                spawnParticles(this.x, this.y, '#888');
                return;
            } else if (cell === BASE) {
                map[row][col] = EMPTY;
                this.alive = false;
                spawnParticles(col * CELL_SIZE + CELL_SIZE/2, row * CELL_SIZE + CELL_SIZE/2, '#ff0000');
                checkBaseDestroyed();
                return;
            }
        }

        // 坦克碰撞
        if (this.isPlayerBullet) {
            for (let enemy of enemiesActive) {
                if (!enemy.alive) continue;
                let dx = this.x - enemy.x;
                let dy = this.y - enemy.y;
                if (Math.abs(dx) < enemy.halfSize && Math.abs(dy) < enemy.halfSize) {
                    enemy.alive = false;
                    this.alive = false;
                    spawnParticles(enemy.x, enemy.y, enemy.color);
                    score += 100;
                    enemiesRemaining--;
                    updateUI();
                    return;
                }
            }
        } else {
            if (player && player.alive) {
                let dx = this.x - player.x;
                let dy = this.y - player.y;
                if (Math.abs(dx) < player.halfSize && Math.abs(dy) < player.halfSize) {
                    player.alive = false;
                    this.alive = false;
                    spawnParticles(player.x, player.y, player.color);
                    playerDeath();
                    return;
                }
            }
        }

        // 子弹间碰撞
        for (let other of bullets) {
            if (other === this || !other.alive) continue;
            if (other.isPlayerBullet !== this.isPlayerBullet) {
                let dx = this.x - other.x;
                let dy = this.y - other.y;
                if (Math.abs(dx) < 6 && Math.abs(dy) < 6) {
                    this.alive = false;
                    other.alive = false;
                    spawnParticles(this.x, this.y, '#ffff00');
                    return;
                }
            }
        }
    }

    draw(ctx) {
        if (!this.alive) return;
        ctx.fillStyle = this.isPlayerBullet ? '#ffff00' : '#ff6644';
        ctx.shadowColor = this.isPlayerBullet ? '#ffaa00' : '#ff0000';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

// 粒子系统
function spawnParticles(x, y, color) {
    for (let i = 0; i < 12; i++) {
        particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4,
            life: 20 + Math.random() * 10,
            maxLife: 30,
            color: color,
            size: 1 + Math.random() * 2
        });
    }
}

function updateParticles() {
    for (let p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
    }
    particles = particles.filter(p => p.life > 0);
}

function drawParticles(ctx) {
    for (let p of particles) {
        let alpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = alpha;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
}

// 地图生成
function createMap() {
    map = [];
    for (let r = 0; r < ROWS; r++) {
        map[r] = new Array(COLS).fill(EMPTY);
    }

    // 基地 U 型防护墙
    let bx = basePosition.x;
    let by = basePosition.y;
    map[by][bx] = BASE;
    // 基地左右两侧砖墙
    map[by][bx - 1] = BRICK;       // 基地左侧 (8,14)
    map[by][bx + 1] = BRICK;       // 基地右侧 (10,14)
    // 上方完整横排（U型的顶部横梁）
    map[by - 1][bx - 1] = BRICK;   // 左上 (8,13)
    map[by - 1][bx] = BRICK;       // 正上 (9,13)
    map[by - 1][bx + 1] = BRICK;   // 右上 (10,13)
    // U 型两侧向下延伸
    map[by - 2][bx - 1] = BRICK;   // 左侧立柱上段 (8,12)
    map[by - 2][bx + 1] = BRICK;   // 右侧立柱上段 (10,12)

    // 随机生成墙壁
    let density = 0.15 + wave * 0.02;
    if (density > 0.35) density = 0.35;

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            // 不在地图边缘生成
            if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) continue;
            if (map[r][c] !== EMPTY) continue;
            // 基地保护区域不放置障碍（扩大范围）
            if (Math.abs(c - bx) <= 2 && Math.abs(r - by) <= 2) continue;
            // 出生点保护区域（行0-4，左侧列0-4，右侧列16-19）
            if (r < 6 && (c < 5 || c > COLS - 6)) continue;
            // 玩家出生点及基地周围保护
            if (r >= by - 4 && r <= by && Math.abs(c - bx) <= 3) continue;

            if (Math.random() < density) {
                if (Math.random() < 0.2) {
                    map[r][c] = STEEL;
                } else {
                    map[r][c] = BRICK;
                }
            }
        }
    }
}

// 绘制地图
function drawMap(ctx) {
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            let x = c * CELL_SIZE;
            let y = r * CELL_SIZE;

            switch (map[r][c]) {
                case BRICK:
                    ctx.fillStyle = '#cc6633';
                    ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    ctx.fillStyle = '#aa4422';
                    ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, 3);
                    ctx.fillRect(x + 1, y + 1, 3, CELL_SIZE - 2);
                    ctx.fillStyle = '#884411';
                    ctx.fillRect(x + 1, y + CELL_SIZE/2 - 1, CELL_SIZE - 2, 2);
                    break;
                case STEEL:
                    ctx.fillStyle = '#888';
                    ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    ctx.fillStyle = '#aaa';
                    ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                    ctx.fillStyle = '#666';
                    ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, 4);
                    break;
                case WATER:
                    ctx.fillStyle = '#2244aa';
                    ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    ctx.fillStyle = '#3366cc';
                    ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                    ctx.strokeStyle = '#4488ee';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(x + 4, y + CELL_SIZE/2);
                    ctx.lineTo(x + CELL_SIZE - 4, y + CELL_SIZE/2);
                    ctx.stroke();
                    break;
                case BASE:
                    // 鹰标（基地）
                    ctx.fillStyle = '#333';
                    ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                    ctx.fillStyle = '#ffcc00';
                    ctx.beginPath();
                    // 简化鹰标
                    ctx.moveTo(x + 16, y + 4);
                    ctx.lineTo(x + 28, y + 20);
                    ctx.lineTo(x + 24, y + 20);
                    ctx.lineTo(x + 20, y + 14);
                    ctx.lineTo(x + 16, y + 18);
                    ctx.lineTo(x + 12, y + 14);
                    ctx.lineTo(x + 8, y + 20);
                    ctx.lineTo(x + 4, y + 20);
                    ctx.lineTo(x + 16, y + 4);
                    ctx.fill();
                    ctx.fillStyle = '#ff4444';
                    ctx.fillRect(x + 12, y + 22, 8, 6);
                    break;
            }
        }
    }
}

// 检查某个单元格位置是否可以让坦克安全出生
function isSpawnCellClear(cellX, cellY) {
    // 坦克出生时完全位于单个格子内（半格偏移），只需检查该格是否为空
    if (cellY < 0 || cellY >= ROWS || cellX < 0 || cellX >= COLS) return false;
    return map[cellY][cellX] === EMPTY;
}

// 生成敌人
function spawnEnemy() {
    if (enemiesSpawned >= totalEnemiesThisWave) return;
    if (enemiesActive.filter(e => e.alive).length >= maxActiveEnemies) return;

    // 使用整数格坐标的出生点（在保护区域中心，远离边缘）
    let spawnCells = [
        { cx: 1, cy: 3 },
        { cx: 2, cy: 3 },
        { cx: 1, cy: 2 },
        { cx: 2, cy: 2 },
        { cx: COLS - 2, cy: 3 },
        { cx: COLS - 3, cy: 3 },
        { cx: COLS - 2, cy: 2 },
        { cx: COLS - 3, cy: 2 }
    ];

    // 随机打乱出生点顺序
    let shuffled = spawnCells.sort(() => Math.random() - 0.5);

    let chosenCell = null;
    let sx = 0, sy = 0;

    for (let sc of shuffled) {
        if (!isSpawnCellClear(sc.cx, sc.cy)) continue;

        // 检查是否被其他坦克占据
        let occupied = false;
        let pixelX = (sc.cx + 0.5) * CELL_SIZE;
        let pixelY = (sc.cy + 0.5) * CELL_SIZE;

        for (let tank of enemiesActive) {
            if (!tank.alive) continue;
            let dx = pixelX - tank.x;
            let dy = pixelY - tank.y;
            if (Math.abs(dx) < CELL_SIZE && Math.abs(dy) < CELL_SIZE) {
                occupied = true;
                break;
            }
        }
        if (occupied) continue;

        if (player && player.alive) {
            let dx = pixelX - player.x;
            let dy = pixelY - player.y;
            if (Math.abs(dx) < CELL_SIZE * 2 && Math.abs(dy) < CELL_SIZE * 2) continue;
        }

        chosenCell = sc;
        sx = pixelX;
        sy = pixelY;
        break;
    }

    // 没有合适的出生点
    if (!chosenCell) return;

    let colors = ['#ff4444', '#ff8844', '#ff4466', '#cc4444', '#ee5555'];
    let color = colors[Math.floor(Math.random() * colors.length)];

    let enemy = new Tank(sx, sy, DIR_DOWN, color, false);
    enemy.flashTimer = 50;
    enemy.shootDelay = 300 + Math.random() * 200;

    // 随着波次增加，敌人略微加快（但总体保持可玩性）
    enemy.speed = 0.003 + wave * 0.0004;
    if (enemy.speed > 0.008) enemy.speed = 0.008;

    enemiesActive.push(enemy);
    enemiesSpawned++;
}

// 玩家死亡
function playerDeath() {
    lives--;
    updateUI();

    if (lives <= 0) {
        endGame(false);
    } else {
        // 重生玩家
        setTimeout(() => {
            respawnPlayer();
        }, 1000);
    }
}

function respawnPlayer() {
    // 玩家出生在 U 型围栏正上方外侧
    let sx = (basePosition.x + 0.5) * CELL_SIZE;
    let sy = (basePosition.y - 3.5) * CELL_SIZE;

    player = new Tank(sx, sy, DIR_UP, '#00cc44', true);
    player.flashTimer = 70;
}

// 基地被摧毁
function checkBaseDestroyed() {
    if (map[basePosition.y][basePosition.x] !== BASE) {
        endGame(false);
    }
}

// 游戏结束
function endGame(victory) {
    gameRunning = false;
    gameOver = true;
    document.getElementById('gameOverTitle').textContent = victory ? '胜利!' : '游戏结束';
    document.getElementById('gameOverTitle').style.color = victory ? '#44ff44' : '#ff4444';
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOverOverlay').classList.add('visible');
}

// 下一波
function nextWave() {
    wave++;
    updateUI();
    totalEnemiesThisWave = 4 + wave * 2;
    if (totalEnemiesThisWave > 20) totalEnemiesThisWave = 20;
    enemiesSpawned = 0;
    enemiesActive = [];
    bullets = [];
    particles = [];
    createMap();
    spawnInterval = Math.max(40, 120 - wave * 10);
}

// 更新UI
function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('wave').textContent = wave;
    document.getElementById('lives').textContent = lives;
    document.getElementById('enemies').textContent = enemiesRemaining;
}

// 初始化游戏
function initGame() {
    score = 0;
    wave = 1;
    lives = 3;
    enemiesActive = [];
    bullets = [];
    particles = [];
    gameRunning = true;
    gameOver = false;
    spawnTimer = 0;
    spawnInterval = 120;
    maxActiveEnemies = 4;
    totalEnemiesThisWave = 6;
    enemiesSpawned = 0;
    document.getElementById('gameOverOverlay').classList.remove('visible');

    createMap();
    respawnPlayer();
    enemiesRemaining = totalEnemiesThisWave;
    updateUI();
}

// 重启游戏
function restartGame() {
    initGame();
}

// 主循环
function gameLoop() {
    if (gameRunning) {
        update();
    }
    render();
    requestAnimationFrame(gameLoop);
}

function update() {
    // 更新玩家
    if (player && player.alive) {
        player.update();
    }

    // 更新敌人
    for (let enemy of enemiesActive) {
        enemy.update();
    }

    // 生成敌人
    spawnTimer--;
    if (spawnTimer <= 0 && enemiesSpawned < totalEnemiesThisWave) {
        spawnEnemy();
        spawnTimer = spawnInterval;
    }

    // 更新子弹
    for (let bullet of bullets) {
        bullet.update();
    }

    // 清理
    bullets = bullets.filter(b => b.alive);
    enemiesActive = enemiesActive.filter(e => e.alive);
    enemiesRemaining = totalEnemiesThisWave - enemiesSpawned + enemiesActive.filter(e => e.alive).length;

    // 更新粒子
    updateParticles();

    // 检查波次完成
    if (enemiesRemaining <= 0 && enemiesSpawned >= totalEnemiesThisWave) {
        nextWave();
    }

    updateUI();
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 背景
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 网格线
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, canvas.height);
        ctx.stroke();
    }
    for (let i = 0; i <= ROWS; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(canvas.width, i * CELL_SIZE);
        ctx.stroke();
    }

    drawMap(ctx);

    // 绘制坦克
    if (player) player.draw(ctx);
    for (let enemy of enemiesActive) {
        enemy.draw(ctx);
    }

    // 绘制子弹
    for (let bullet of bullets) {
        bullet.draw(ctx);
    }

    // 绘制粒子
    drawParticles(ctx);

    // 游戏暂停提示
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}

// 键盘事件
window.addEventListener('keydown', (e) => {
    keys[e.key] = true;

    if (e.key === 'r' || e.key === 'R') {
        restartGame();
    }

    // 防止方向键滚动页面
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
    }
});

window.addEventListener('keyup', (e) => {
    keys[e.key] = false;
});

// 移动端触屏控制
let touchActive = false;
let touchDir = DIR_UP;

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    touchActive = true;
    let touch = e.touches[0];
    let rect = canvas.getBoundingClientRect();
    let tx = touch.clientX - rect.left;
    let ty = touch.clientY - rect.top;

    // 判断点击位置相对于玩家
    if (player && player.alive) {
        let px = player.x;
        let py = player.y;
        let dx = tx - px;
        let dy = ty - py;

        if (Math.abs(dx) > Math.abs(dy)) {
            touchDir = dx > 0 ? DIR_RIGHT : DIR_LEFT;
            keys['Arrow' + (dx > 0 ? 'Right' : 'Left')] = true;
        } else {
            touchDir = dy > 0 ? DIR_DOWN : DIR_UP;
            keys['Arrow' + (dy > 0 ? 'Down' : 'Up')] = true;
        }
        keys[' '] = true;
    }
});

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!touchActive) return;
    let touch = e.touches[0];
    let rect = canvas.getBoundingClientRect();
    let tx = touch.clientX - rect.left;
    let ty = touch.clientY - rect.top;

    // 清除旧方向
    keys['ArrowUp'] = false;
    keys['ArrowDown'] = false;
    keys['ArrowLeft'] = false;
    keys['ArrowRight'] = false;

    if (player && player.alive) {
        let px = player.x;
        let py = player.y;
        let dx = tx - px;
        let dy = ty - py;

        if (Math.abs(dx) > Math.abs(dy)) {
            touchDir = dx > 0 ? DIR_RIGHT : DIR_LEFT;
            keys['Arrow' + (dx > 0 ? 'Right' : 'Left')] = true;
        } else {
            touchDir = dy > 0 ? DIR_DOWN : DIR_UP;
            keys['Arrow' + (dy > 0 ? 'Down' : 'Up')] = true;
        }
    }
});

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    touchActive = false;
    keys['ArrowUp'] = false;
    keys['ArrowDown'] = false;
    keys['ArrowLeft'] = false;
    keys['ArrowRight'] = false;
    keys[' '] = false;
});

// 启动游戏
initGame();
gameLoop();
</script>
</body>
